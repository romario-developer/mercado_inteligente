name: mercado_inteligente
description: "Um PWA de mercado inteligente."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Substituindo Isar pelo Hive (Padrão ouro para Flutter Web)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  isar: ^2.1.4
  isar_flutter_libs: ^2.1.4
  path_provider: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true